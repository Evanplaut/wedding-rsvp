<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ally & Evan - Wedding RSVP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --white: #ffffff;
            --text: #3d3d3d;
            --text-light: #7d756b;
            --text-muted: #9a9a9a;
            --accent: #b5a088;
            --accent-hover: #a39477;
            --accent-light: rgba(181, 160, 136, 0.1);
            --border: #e8e8e8;
            --border-light: #f0eeeb;
            --input-bg: #fdfbf9;
            --error: #c47c7c;
            --success: #7a9b6d;
        }
        html, body { height: 100%; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f9f8f6 0%, #faf9f7 100%);
            color: var(--text);
        }
        .page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
        }
        .hero {
            flex-shrink: 0;
            padding: 80px 60px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            border-bottom: 1px solid var(--border-light);
        }
        .hero-content { width: 100%; }
        .accent-line {
            width: 40px;
            height: 2px;
            background: var(--accent);
            margin: 0 auto 32px;
            opacity: 0.8;
            animation: fadeInUp 0.8s ease-out backwards;
        }
        .monogram {
            width: 100px;
            height: auto;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease-out backwards;
        }
        .names {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 72px;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 2px;
            animation: fadeInUp 0.8s ease-out 0.1s backwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .names .ampersand {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 12px 0;
            font-weight: 400;
        }
        .date {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 28px;
            margin-bottom: 8px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }
        .venue {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-light);
            animation: fadeInUp 0.8s ease-out 0.3s backwards;
            line-height: 1.8;
        }
        .venue-line { display: block; }
        .divider {
            width: 1px;
            height: 50px;
            background: var(--border);
            margin: 0 auto;
            flex-shrink: 0;
            opacity: 0.6;
        }
        .rsvp-section {
            flex-shrink: 0;
            padding: 0 0 60px;
            text-align: center;
            animation: fadeIn 0.8s ease-out 0.4s backwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .form-card {
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 0 1px rgba(181, 160, 136, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            animation: cardSlideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s backwards;
        }
        @keyframes cardSlideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .rsvp-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            display: block;
        }
        .rsvp-heading {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: 40px;
            color: var(--text);
            margin-bottom: 40px;
        }
        .rsvp-form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .form-group {
            margin-bottom: 36px;
            animation: formGroupFade 0.6s ease-out backwards;
        }
        .form-group:nth-child(1) { animation-delay: 0.5s; }
        .form-group:nth-child(2) { animation-delay: 0.57s; }
        .form-group:nth-child(3) { animation-delay: 0.64s; }
        @keyframes formGroupFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 14px;
        }
        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 16px 18px;
            background: var(--input-bg);
            border: 2px solid var(--border-light);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 300;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-group input[type="text"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--white);
            box-shadow: 0 0 0 4px var(--accent-light), 0 8px 20px rgba(181, 160, 136, 0.25);
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 16px 18px;
            border: 2px solid var(--border-light);
            border-radius: 4px;
            background: var(--input-bg);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .radio-option:hover {
            border-color: var(--accent);
            background: rgba(181, 160, 136, 0.08);
        }
        .radio-option input[type="radio"] {
            width: 22px;
            height: 22px;
            margin-right: 14px;
            cursor: pointer;
            accent-color: var(--accent);
        }
        .radio-option.checked {
            border-color: var(--accent);
            background: var(--accent-light);
            box-shadow: 0 0 0 1px var(--accent), 0 4px 12px rgba(181, 160, 136, 0.2);
        }
        .radio-option label {
            margin-bottom: 0;
            cursor: pointer;
            font-size: 15px;
        }
        .conditional-group {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.4s ease, margin-bottom 0.4s ease;
        }
        .conditional-group.visible {
            max-height: 500px;
            opacity: 1;
            margin-bottom: 36px;
        }
        .sub-label {
            display: block;
            font-weight: 500;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 28px 0 14px;
            padding-top: 28px;
            border-top: 1px solid var(--border-light);
        }
        .submit-btn {
            width: 100%;
            padding: 18px 36px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: var(--white);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 12px 36px rgba(181, 160, 136, 0.3);
            margin-top: 12px;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 16px 48px rgba(181, 160, 136, 0.4);
        }
        .footer {
            flex-shrink: 0;
            padding: 40px 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-light);
            text-align: center;
            opacity: 0.6;
        }
        @media (max-width: 480px) {
            .hero { padding: 60px 20px; }
            .names { font-size: 56px; }
            .monogram { width: 80px; }
            .form-card { padding: 40px 32px; }
        }
    </style>
</head>
